<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Zaynii</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#274472;
    --sky2:#4d7cb5;
    --sky3:#a9d3f5;
    --paper:#fff8fb;
    --paper-dark:#ffe2ee;
    --ink:#4a3a63;
    --ink-soft:#7c6a95;
    --rose:#e0617f;
    --rose-deep:#b23e5c;
    --gold:#f3d98b;
    --box-blue:#5a9bd8;
    --box-blue-deep:#3a6fa8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 55%, var(--sky3) 100%);
    font-family:'Cormorant Garamond','EB Garamond',serif;
    color:var(--ink);
    height:100vh; width:100vw;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }

  /* clouds */
  .cloud{
    position:fixed; background:#fff; opacity:0.75; border-radius:50%;
    filter:blur(1px);
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{ transform:translateX(-15vw); }
    100%{ transform:translateX(115vw); }
  }

  /* sparkles */
  .sparkle{
    position:fixed; width:5px; height:5px; border-radius:50%;
    background:#fff; opacity:0.8;
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:0.2;} 50%{opacity:0.9;} }

  /* moon glow */
  .moon{
    position:fixed; top:6%; right:10%;
    width:100px; height:100px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fffdf3, #f3ecc9 55%, #e2d7a8 85%);
    box-shadow:0 0 40px 16px rgba(255,250,230,0.5), 0 0 100px 34px rgba(200,224,255,0.28);
    animation:moonGlow 6s ease-in-out infinite;
    z-index:0;
  }
  .moon::before, .moon::after{
    content:''; position:absolute; border-radius:50%;
    background:rgba(200,190,150,0.35);
  }
  .moon::before{ width:16px; height:16px; top:22px; left:20px; }
  .moon::after{ width:10px; height:10px; top:52px; left:52px; }
  @keyframes moonGlow{ 0%,100%{ transform:scale(1); opacity:0.95; } 50%{ transform:scale(1.05); opacity:1; } }

  /* falling hearts */
  .falling-heart{
    position:fixed; top:-30px; font-family:'Great Vibes',cursive, serif;
    color:var(--rose); opacity:0.85; pointer-events:none;
    animation:fallDown linear infinite;
    z-index:1;
  }
  @keyframes fallDown{
    0%{ transform:translateY(-5vh) translateX(0) rotate(0deg); opacity:0; }
    8%{ opacity:0.9; }
    90%{ opacity:0.7; }
    100%{ transform:translateY(108vh) translateX(var(--drift,20px)) rotate(25deg); opacity:0; }
  }

  .stage{position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; perspective:1600px;}

  /* ---- gift box (letter comes out of this) ---- */
  .box{
    position:relative; width:170px; height:150px; cursor:pointer;
    z-index:5;
    animation:idle 3s ease-in-out infinite;
  }
  @keyframes idle{
    0%,100%{ transform:translateY(0) rotate(-1deg); }
    50%{ transform:translateY(-8px) rotate(1deg); }
  }
  .box-body{
    position:absolute; bottom:0; left:0; right:0; height:96px;
    background:linear-gradient(160deg,#8fc9ff,var(--box-blue) 55%,var(--box-blue-deep));
    border:1px solid var(--box-blue-deep);
    border-radius:6px;
    box-shadow:0 16px 30px rgba(30,60,100,0.35), inset 0 0 0 1px rgba(255,255,255,0.25);
  }
  .box-lid{
    position:absolute; top:26px; left:-8px; right:-8px; height:34px;
    background:linear-gradient(160deg,#b6e0ff,#79b6e8);
    border:1px solid var(--box-blue-deep);
    border-radius:5px;
    box-shadow:0 6px 12px rgba(30,60,100,0.28);
    transform-origin:top center; transform:rotateX(0deg);
    transition:transform .65s cubic-bezier(.6,.05,.3,1), opacity .5s ease;
    backface-visibility:hidden; z-index:4;
  }
  .ribbon-v{
    position:absolute; top:0; bottom:0; left:50%; width:18px; transform:translateX(-50%);
    background:linear-gradient(180deg,#ffaec4,var(--rose));
    z-index:2;
  }
  .ribbon-h{
    position:absolute; left:0; right:0; top:14px; height:16px;
    background:linear-gradient(90deg,#ffaec4,var(--rose));
    z-index:5;
  }
  .bow{
    position:absolute; top:-16px; left:50%; transform:translateX(-50%);
    width:56px; height:34px; z-index:6;
  }
  .hint-box{
    position:absolute; bottom:-30px; left:50%; transform:translateX(-50%);
    font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--paper);
    white-space:nowrap; text-shadow:0 1px 3px rgba(0,0,0,0.25);
  }
  .box.opening .box-lid{ transform:rotateX(-125deg) translateY(-4px); opacity:0; }
  .box.opening .box-body{ transition:transform .5s ease .2s, opacity .5s ease .2s; transform:scale(0.9) translateY(6px); opacity:0; }
  .box.opening .ribbon-v, .box.opening .ribbon-h, .box.opening .bow, .box.opening .hint-box{
    transition:opacity .4s ease .1s; opacity:0;
  }
  .box.opening{ animation:none; }

  /* ---- scroll (letter, rises out of the box, then unrolls open) ---- */
  .scroll-wrap{
    position:absolute; display:flex; flex-direction:column; align-items:center;
    width:min(88vw, 560px); z-index:3;
    opacity:0; transform:translateY(50px) scale(0.2);
    transition:opacity .55s ease, transform .75s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
  }
  .scroll-wrap.visible{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }

  .rod{
    width:100%; height:16px; border-radius:10px;
    background:linear-gradient(180deg,#ffb3ca,var(--rose) 45%,var(--rose-deep));
    box-shadow:0 3px 8px rgba(178,62,92,0.3);
    position:relative; z-index:3; flex-shrink:0;
  }
  .rod::before, .rod::after{
    content:''; position:absolute; top:50%; width:22px; height:22px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd3e2, var(--rose-deep));
    transform:translateY(-50%);
    box-shadow:0 2px 5px rgba(0,0,0,0.25);
  }
  .rod::before{ left:-14px; }
  .rod::after{ right:-14px; }

  .scroll-outer{
    width:100%; overflow:hidden; height:0; max-height:70vh;
    transition:height .95s cubic-bezier(.4,0,.2,1);
    background:
      repeating-linear-gradient(0deg, rgba(178,62,92,0.02) 0px, transparent 2px, transparent 26px),
      linear-gradient(160deg,#fff5f8,#ffe0ea);
    box-shadow:0 16px 34px rgba(178,62,92,0.22);
    position:relative;
  }
  .scroll-outer.scrollable{ overflow-y:auto; }
  .scroll-inner{ padding:44px 40px 34px; text-align:center; }
  .curl-shadow{
    position:absolute; left:0; right:0; bottom:0; height:30px;
    background:linear-gradient(180deg, transparent, rgba(178,62,92,0.35));
    pointer-events:none; transition:opacity .5s ease; opacity:1;
  }
  .scroll-outer.done .curl-shadow{ opacity:0.12; }

  h1,h2{ font-family:'Great Vibes', cursive; font-weight:400; color:var(--rose-deep); margin:0 0 16px; }
  h1{ font-size:clamp(34px,6vw,52px); }
  p{ font-size:clamp(16px,2vw,19px); line-height:1.8; color:var(--ink); max-width:460px; margin:0 auto 14px; }
  p:last-of-type{ margin-bottom:0; }
  .eyebrow{
    letter-spacing:3px; text-transform:uppercase; font-size:11px;
    color:var(--ink-soft); margin-bottom:12px;
  }
  .signature{ font-family:'Great Vibes',cursive; font-size:34px; color:var(--rose-deep); margin-top:18px; }

  .next-btn{
    margin-top:26px;
    font-family:'EB Garamond',serif; font-size:17px; letter-spacing:0.5px;
    padding:12px 28px; border-radius:30px; cursor:pointer;
    background:var(--rose); color:#fff5f8; border:1px solid var(--rose-deep);
    box-shadow:0 6px 16px rgba(178,62,92,0.3);
    transition:transform .2s ease, opacity .3s ease;
  }
  .next-btn:hover{ transform:scale(1.05); }
  .page-counter{
    margin-top:10px; font-size:12px; letter-spacing:2px; color:var(--ink-soft); text-transform:uppercase;
  }

  /* birds */
  .bird{ position:fixed; top:12%; left:-60px; width:34px; height:20px; z-index:2; animation:flyAcross 17s linear infinite; opacity:0.9; }
  .bird svg{ width:100%; height:100%; display:block; }
  .bird .wing{ transform-origin:50% 50%; animation:flap 0.45s ease-in-out infinite alternate; }
  .bird.b2{ top:22%; animation-duration:20s; animation-delay:3s; }
  .bird.b3{ top:8%; animation-duration:23s; animation-delay:7s; }
  .bird.b4{ top:30%; animation-duration:15s; animation-delay:10s; }
  @keyframes flyAcross{
    0%{ transform:translate(0,0); }
    50%{ transform:translate(60vw, -6vh); }
    100%{ transform:translate(130vw, 4vh); }
  }
  @keyframes flap{
    0%{ transform:scaleY(1) rotate(0deg); }
    100%{ transform:scaleY(0.5) rotate(-12deg); }
  }

  /* cat */
  .cat{ position:fixed; bottom:0; right:16px; width:88px; height:92px; z-index:5; transform-origin:bottom center; animation:catSway 4.5s ease-in-out infinite; }
  .cat svg{ width:100%; height:100%; display:block; }
  @keyframes catSway{ 0%,100%{ transform:rotate(0deg); } 50%{ transform:rotate(1.5deg); } }
  .cat .tail{ transform-origin:90% 90%; animation:tailSwish 2.6s ease-in-out infinite; }
  @keyframes tailSwish{ 0%,100%{ transform:rotate(0deg); } 50%{ transform:rotate(-14deg); } }
  .cat .eyes{ animation:blink 4.2s ease-in-out infinite; transform-origin:center; }
  @keyframes blink{ 0%,92%,100%{ transform:scaleY(1); } 95%{ transform:scaleY(0.1); } }

  @media (max-width:560px){
    .cat{ width:64px; height:68px; right:6px; }
    .bird{ width:26px; height:16px; }
    .scroll-inner{ padding:34px 24px 26px; }
  }

  .music-toggle{
    position:fixed; left:20px; bottom:20px; z-index:60;
    display:flex; align-items:center; gap:8px;
    font-size:12px; letter-spacing:1px; color:var(--ink-soft);
    background:rgba(255,255,255,0.65); border:1px solid var(--paper-dark);
    padding:8px 14px; border-radius:20px; cursor:pointer;
    backdrop-filter:blur(2px);
  }
  .music-toggle .dotpulse{ width:7px; height:7px; border-radius:50%; background:var(--rose); animation:twinkle 1.6s ease-in-out infinite; }
</style>
</head>
<body>

<!-- moon glow -->
<div class="moon"></div>

<!-- clouds -->
<div class="cloud" style="width:120px;height:44px;top:8%;animation-duration:38s;"></div>
<div class="cloud" style="width:90px;height:34px;top:16%;animation-duration:46s;animation-delay:6s;"></div>
<div class="cloud" style="width:150px;height:52px;top:5%;animation-duration:55s;animation-delay:14s;"></div>
<div class="cloud" style="width:80px;height:30px;top:24%;animation-duration:32s;animation-delay:2s;"></div>
<div class="cloud" style="width:110px;height:40px;top:12%;animation-duration:42s;animation-delay:20s;"></div>
<div class="cloud" style="width:70px;height:26px;top:30%;animation-duration:28s;animation-delay:9s;"></div>

<div id="sparkles"></div>
<div id="hearts"></div>

<!-- birds -->
<div class="bird b1"><svg viewBox="0 0 60 34" fill="none">
  <path class="wing" d="M30 20 C20 6,4 6,0 14 C10 14,20 16,30 20 Z" fill="var(--rose)"/>
  <path class="wing" d="M30 20 C40 6,56 6,60 14 C50 14,40 16,30 20 Z" fill="var(--rose)"/>
</svg></div>
<div class="bird b2"><svg viewBox="0 0 60 34" fill="none">
  <path class="wing" d="M30 20 C20 6,4 6,0 14 C10 14,20 16,30 20 Z" fill="#ffffff"/>
  <path class="wing" d="M30 20 C40 6,56 6,60 14 C50 14,40 16,30 20 Z" fill="#ffffff"/>
</svg></div>
<div class="bird b3"><svg viewBox="0 0 60 34" fill="none">
  <path class="wing" d="M30 20 C20 6,4 6,0 14 C10 14,20 16,30 20 Z" fill="var(--gold)"/>
  <path class="wing" d="M30 20 C40 6,56 6,60 14 C50 14,40 16,30 20 Z" fill="var(--gold)"/>
</svg></div>
<div class="bird b4"><svg viewBox="0 0 60 34" fill="none">
  <path class="wing" d="M30 20 C20 6,4 6,0 14 C10 14,20 16,30 20 Z" fill="var(--rose-deep)"/>
  <path class="wing" d="M30 20 C40 6,56 6,60 14 C50 14,40 16,30 20 Z" fill="var(--rose-deep)"/>
</svg></div>

<!-- cat -->
<div class="cat">
  <svg viewBox="0 0 100 100" fill="none">
    <path class="tail" d="M80 85 C100 80,98 55,82 55" stroke="var(--ink-soft)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="46" cy="70" rx="34" ry="26" fill="#f7d6df"/>
    <circle cx="42" cy="38" r="24" fill="#f7d6df"/>
    <path d="M22 22 L28 4 L38 24 Z" fill="#f7d6df"/>
    <path d="M62 22 L58 4 L48 24 Z" fill="#f7d6df"/>
    <path d="M25 20 L29 10 L35 22 Z" fill="var(--rose)"/>
    <path d="M59 20 L55 10 L49 22 Z" fill="var(--rose)"/>
    <g class="eyes">
      <ellipse cx="34" cy="38" rx="3.4" ry="5" fill="#6b3a4a"/>
      <ellipse cx="52" cy="38" rx="3.4" ry="5" fill="#6b3a4a"/>
    </g>
    <path d="M42 46 L38 50 L46 50 Z" fill="var(--rose-deep)"/>
    <path d="M42 50 C40 54,44 54,42 50" stroke="#6b3a4a" stroke-width="1.6" fill="none"/>
    <ellipse cx="20" cy="46" rx="20" ry="6" fill="#ff8fac" transform="rotate(-8 20 46)" opacity="0.5"/>
    <path d="M60 20 L66 12 L70 22 L64 24 Z" fill="var(--rose-deep)"/>
  </svg>
</div>

<div class="stage">
  <div class="box" id="packet" onclick="openLetter()">
    <div class="box-body"></div>
    <div class="ribbon-v"></div>
    <div class="box-lid">
      <div class="ribbon-h"></div>
    </div>
    <svg class="bow" viewBox="0 0 56 34" fill="none">
      <ellipse cx="14" cy="17" rx="14" ry="11" fill="var(--rose)" transform="rotate(-18 14 17)"/>
      <ellipse cx="42" cy="17" rx="14" ry="11" fill="var(--rose)" transform="rotate(18 42 17)"/>
      <circle cx="28" cy="17" r="7" fill="var(--rose-deep)"/>
    </svg>
    <div class="hint-box">tap to open</div>
  </div>

  <div class="scroll-wrap" id="scrollWrap">
    <div class="rod"></div>
    <div class="scroll-outer" id="scrollOuter">
      <div class="scroll-inner" id="scrollInner"></div>
      <div class="curl-shadow"></div>
    </div>
    <div class="rod"></div>
  </div>
</div>

<div class="music-toggle" id="musicToggle">
  <span class="dotpulse"></span>
  <span id="musicLabel">play music</span>
</div>

<script>
  // sparkles
  const sparkleHost = document.getElementById('sparkles');
  for(let i=0;i<20;i++){
    const s = document.createElement('div');
    s.className='sparkle';
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*60+'vh';
    s.style.animationDelay = (Math.random()*3)+'s';
    s.style.animationDuration = (2+Math.random()*3)+'s';
    sparkleHost.appendChild(s);
  }

  // falling hearts, continuous
  const heartHost = document.getElementById('hearts');
  const heartColors = ['#e0617f','#ff8fac','#e8a94f','#b23e5c'];
  function spawnHeart(){
    const h = document.createElement('div');
    h.className = 'falling-heart';
    h.textContent = '❤';
    h.style.left = Math.random()*100+'vw';
    h.style.fontSize = (14+Math.random()*18)+'px';
    h.style.color = heartColors[Math.floor(Math.random()*heartColors.length)];
    h.style.setProperty('--drift', (Math.random()*60-30)+'px');
    const dur = 7+Math.random()*7;
    h.style.animationDuration = dur+'s';
    heartHost.appendChild(h);
    setTimeout(()=>h.remove(), dur*1000 + 200);
  }
  for(let i=0;i<10;i++){ setTimeout(spawnHeart, i*400); }
  setInterval(spawnHeart, 900);

  function heartBurst(x,y,count){
    for(let i=0;i<count;i++){
      const h = document.createElement('div');
      h.textContent = '❤';
      h.style.position='fixed';
      h.style.left = x+'px'; h.style.top = y+'px';
      h.style.fontSize = (14+Math.random()*14)+'px';
      h.style.color = heartColors[Math.floor(Math.random()*heartColors.length)];
      h.style.pointerEvents='none';
      h.style.zIndex = 70;
      const ang = Math.random()*Math.PI*2;
      const dist = 60 + Math.random()*130;
      h.style.transition = 'transform 1.1s ease-out, opacity 1.1s ease-out';
      h.style.transform = 'translate(0,0) scale(0.6)';
      h.style.opacity = '1';
      document.body.appendChild(h);
      requestAnimationFrame(()=>{
        h.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px) scale(1.2)`;
        h.style.opacity = '0';
      });
      setTimeout(()=>h.remove(), 1200);
    }
  }

  // ---- tiny generated music-box melody (original, no file needed) ----
  let audioCtx = null, masterGain = null, melodyTimer = null, musicPlaying = false;
  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.15;
      const warmth = audioCtx.createBiquadFilter();
      warmth.type = 'lowpass'; warmth.frequency.value = 2600;
      masterGain.connect(warmth); warmth.connect(audioCtx.destination);
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  const NOTE = {C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,C6:1046.50,D6:1174.66,E6:1318.51};
  const melody = [
    [NOTE.E5,0.35],[NOTE.G5,0.35],[NOTE.C6,0.5],[NOTE.B5,0.35],[NOTE.G5,0.35],
    [NOTE.A5,0.35],[NOTE.C6,0.35],[NOTE.E6,0.7],
    [0,0.25],
    [NOTE.D6,0.35],[NOTE.B5,0.35],[NOTE.G5,0.5],[NOTE.A5,0.35],[NOTE.F5,0.35],
    [NOTE.G5,0.35],[NOTE.E5,0.35],[NOTE.C5,0.8],
    [0,0.5]
  ];
  function pluckNote(freq, dur, startTime){
    if(!freq) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    const overtone = audioCtx.createOscillator(); overtone.type = 'sine'; overtone.frequency.value = freq*2;
    const overtoneGain = audioCtx.createGain(); overtoneGain.gain.value = 0.15;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.5, startTime+0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime+dur);
    osc.connect(gain); overtone.connect(overtoneGain); overtoneGain.connect(gain); gain.connect(masterGain);
    osc.start(startTime); osc.stop(startTime+dur+0.05);
    overtone.start(startTime); overtone.stop(startTime+dur+0.05);
  }
  function scheduleLoop(){
    ensureAudio();
    let t = audioCtx.currentTime + 0.1;
    melody.forEach(([freq,dur])=>{ pluckNote(freq, dur*0.92, t); t += dur; });
    const totalDur = melody.reduce((s,[,d])=>s+d,0);
    melodyTimer = setTimeout(scheduleLoop, totalDur*1000);
  }
  function playMusic(){
    ensureAudio();
    if(musicPlaying) return;
    musicPlaying = true; scheduleLoop();
    musicLabel.textContent = 'music playing';
  }
  function stopMusic(){
    musicPlaying = false; clearTimeout(melodyTimer);
    musicLabel.textContent = 'play music';
  }
  const musicToggle = document.getElementById('musicToggle');
  const musicLabel = document.getElementById('musicLabel');
  musicToggle.addEventListener('click', ()=>{ if(musicPlaying) stopMusic(); else playMusic(); });

  const pages = [
    {
      html: `
        <div class="eyebrow">page one</div>
        <h1>My beautiful Zaynii,</h1>
        <p>You know what my favorite thing is? Watching you sleep.</p>
        <p>You always look so unbelievably cute when you're sleeping. I don't know how you do it, but every single time I look at you, I just smile without even realizing it. Your face becomes so peaceful, so innocent, so soft. It makes me want to protect you from every little thing that could ever hurt you. I could honestly spend hours just looking at you and thinking how lucky I am.</p>
        <p>Usually we stay together until we say goodnight, exchange our kisses, and fall asleep together. It's one of my favorite parts of the day because it feels like no matter how busy life gets, we always end it with each other.</p>
        <p>Today was a little different because I was with Anum didi and Ayman, and you fell asleep while we were still talking. I hope you didn't feel bad that I wasn't sleeping beside you like we normally do. I'm really sorry if it made you feel even a little lonely.</p>
        <p>But do you know something that made me smile?</p>
        <p>Even while you were sleeping, you were still the center of everything. We kept talking about you. I was telling them how sweet you are, how respectful you are, how kind your heart is, how caring and loving you are. I couldn't stop praising you because that's genuinely how I see you. I wasn't saying those things just because you're my girlfriend. I was saying them because they're true.</p>
        <p>I told them how you helped me become a better person. You believed in me when I didn't even believe in myself. You helped me leave drugs behind and gave me a reason to choose a better life. You'll probably never understand how big that is for me. You didn't just change my habits. You changed my future.</p>

  let pageIndex = 0;
  const packet = document.getElementById('packet');
  const scrollWrap = document.getElementById('scrollWrap');
  const scrollOuter = document.getElementById('scrollOuter');
  const scrollInner = document.getElementById('scrollInner');

  function renderPage(i, opts){
    const data = pages[i];
    let html = data.html;
    if(data.btn){
      html += `<button class="next-btn" onclick="nextPage(event)">${data.btn}</button>`;
    }
    html += `<div class="page-counter">${i+1} / ${pages.length}</div>`;
    scrollInner.innerHTML = html;
    scrollOuter.scrollTop = 0;

    requestAnimationFrame(()=>{
      const target = Math.min(scrollInner.scrollHeight, window.innerHeight * 0.72);
      scrollOuter.classList.remove('done','scrollable');
      scrollOuter.style.height = target + 'px';
      scrollOuter.scrollTop = 0;
      scrollOuter.addEventListener('transitionend', function onDone(e){
        if(e.propertyName !== 'height') return;
        scrollOuter.classList.add('done');
        scrollOuter.scrollTop = 0;
        if(scrollInner.scrollHeight > target + 2){
          scrollOuter.classList.add('scrollable');
        }
        scrollOuter.removeEventListener('transitionend', onDone);
      });
    });
  }

  function openLetter(){
    if(packet.classList.contains('opening')) return;
    packet.classList.add('opening');
    ensureAudio();
    playMusic();
    setTimeout(()=>{
      packet.style.display = 'none';
      scrollWrap.classList.add('visible');
      renderPage(pageIndex);
    }, 350);
  }

  function nextPage(e){
    if(e && e.clientX){ heartBurst(e.clientX, e.clientY, 14); }
    scrollOuter.classList.remove('done','scrollable');
    scrollOuter.style.height = '0px';
    scrollOuter.addEventListener('transitionend', function onClosed(ev){
      if(ev.propertyName !== 'height') return;
      scrollOuter.removeEventListener('transitionend', onClosed);
      pageIndex++;
      renderPage(pageIndex);
    });
  }
</script>
